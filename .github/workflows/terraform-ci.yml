name: Terraform CI

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      # Match every workflow file so workflow-only PRs (e.g. updating a deploy
      # workflow) still produce a Terraform CI status. Without this, the
      # required `Terraform validation` check stays in "Expected — Waiting"
      # forever and blocks merge.
      - ".github/workflows/**"
      - "scripts/**"
      - "tests/**"
      - "terraform/**"
      - "README.md"
      - "docs/**"
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "tests/**"
      - "terraform/**"
      - "README.md"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: terraform-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terraform-ci:
    name: Terraform validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_EC2_METADATA_DISABLED: "true"
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.15.2
          terraform_wrapper: false

      - name: Run Terraform validation suite
        run: ./scripts/validate-terraform-ci.sh
