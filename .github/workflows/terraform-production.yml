name: Terraform Production

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Terraform command to run"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - cleanup-accidental-stack-plan
          - cleanup-accidental-stack-apply
          - bootstrap-backend-plan
          - bootstrap-backend-apply
      apply_confirmation:
        description: "Required for apply commands: apply-production, cleanup-accidental-stack, or bootstrap-production-backend"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: shaka-production-terraform
  cancel-in-progress: false

jobs:
  terraform-production:
    name: Terraform production ${{ inputs.command }}
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      SHAKA_AVAILABILITY_ZONES_JSON: ${{ vars.SHAKA_AVAILABILITY_ZONES_JSON || '["ap-northeast-2a","ap-northeast-2c"]' }}
      SHAKA_PRIVATE_SUBNET_CIDRS_JSON: ${{ vars.SHAKA_PRIVATE_SUBNET_CIDRS_JSON || '["10.42.10.0/24","10.42.11.0/24"]' }}
      TF_VAR_existing_app_instance_id: ${{ vars.SHAKA_EXISTING_APP_INSTANCE_ID }}
      TF_VAR_existing_app_security_group_id: ${{ vars.SHAKA_EXISTING_APP_SECURITY_GROUP_ID }}
      TF_VAR_database_name: ${{ vars.SHAKA_DATABASE_NAME || 'shaka' }}
      TF_VAR_db_username: ${{ secrets.SHAKA_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.SHAKA_DB_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate command and confirmation
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.command }}" in
            plan|bootstrap-backend-plan|cleanup-accidental-stack-plan)
              ;;
            apply)
              if [[ "${{ inputs.apply_confirmation }}" != "apply-production" ]]; then
                echo "apply requires apply_confirmation=apply-production" >&2
                exit 1
              fi
              ;;
            cleanup-accidental-stack-apply)
              if [[ "${{ inputs.apply_confirmation }}" != "cleanup-accidental-stack" ]]; then
                echo "cleanup-accidental-stack-apply requires apply_confirmation=cleanup-accidental-stack" >&2
                exit 1
              fi
              ;;
            bootstrap-backend-apply)
              if [[ "${{ inputs.apply_confirmation }}" != "bootstrap-production-backend" ]]; then
                echo "bootstrap-backend-apply requires apply_confirmation=bootstrap-production-backend" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported command: ${{ inputs.command }}" >&2
              exit 1
              ;;
          esac

      - name: Configure AWS credentials from production environment
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.2
          terraform_wrapper: false

      - name: Materialize non-secret production variables
        if: ${{ inputs.command == 'plan' || inputs.command == 'apply' || startsWith(inputs.command, 'cleanup-accidental-stack-') }}
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/environments/prod
          python3 - <<'PY'
          import json, os, pathlib
          required = [
              'TF_VAR_existing_app_instance_id',
              'TF_VAR_existing_app_security_group_id',
              'TF_VAR_db_username',
              'TF_VAR_db_password',
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit('Missing required production environment values: ' + ', '.join(missing))
          availability_zones = os.environ.get('SHAKA_AVAILABILITY_ZONES_JSON')
          private_subnet_cidrs = os.environ.get('SHAKA_PRIVATE_SUBNET_CIDRS_JSON')
          if not availability_zones:
              raise SystemExit('Missing required production environment variable: SHAKA_AVAILABILITY_ZONES_JSON')
          if not private_subnet_cidrs:
              raise SystemExit('Missing required production environment variable: SHAKA_PRIVATE_SUBNET_CIDRS_JSON')
          data = {
              'availability_zones': json.loads(availability_zones),
              'private_subnet_cidrs': json.loads(private_subnet_cidrs),
          }
          pathlib.Path('production.auto.tfvars.json').write_text(json.dumps(data, indent=2), encoding='utf-8')
          PY

      - name: Terraform prod fmt check
        if: ${{ inputs.command == 'plan' || inputs.command == 'apply' || startsWith(inputs.command, 'cleanup-accidental-stack-') }}
        run: terraform -chdir=terraform/environments/prod fmt -check -recursive

      - name: Terraform prod init
        if: ${{ inputs.command == 'plan' || inputs.command == 'apply' || startsWith(inputs.command, 'cleanup-accidental-stack-') }}
        run: terraform -chdir=terraform/environments/prod init

      - name: Terraform prod validate
        if: ${{ inputs.command == 'plan' || inputs.command == 'apply' || startsWith(inputs.command, 'cleanup-accidental-stack-') }}
        run: terraform -chdir=terraform/environments/prod validate

      - name: Terraform prod plan
        if: ${{ inputs.command == 'plan' || inputs.command == 'apply' || startsWith(inputs.command, 'cleanup-accidental-stack-') }}
        run: terraform -chdir=terraform/environments/prod plan -out=production.tfplan

      - name: Cleanup accidental production stack preview
        if: ${{ inputs.command == 'cleanup-accidental-stack-plan' }}
        run: ./scripts/cleanup-accidental-prod-stack.sh plan

      - name: Cleanup accidental production stack apply
        if: ${{ inputs.command == 'cleanup-accidental-stack-apply' }}
        run: ./scripts/cleanup-accidental-prod-stack.sh apply

      - name: Terraform prod apply
        if: ${{ inputs.command == 'apply' }}
        run: terraform -chdir=terraform/environments/prod apply -input=false production.tfplan

      - name: Terraform prod outputs
        if: ${{ inputs.command == 'apply' }}
        run: terraform -chdir=terraform/environments/prod output

      - name: Terraform backend fmt check
        if: ${{ startsWith(inputs.command, 'bootstrap-backend-') }}
        run: terraform -chdir=terraform/bootstrap/backend fmt -check -recursive

      - name: Terraform backend init
        if: ${{ startsWith(inputs.command, 'bootstrap-backend-') }}
        run: terraform -chdir=terraform/bootstrap/backend init -input=false

      - name: Terraform backend validate
        if: ${{ startsWith(inputs.command, 'bootstrap-backend-') }}
        run: terraform -chdir=terraform/bootstrap/backend validate

      - name: Terraform backend plan
        if: ${{ startsWith(inputs.command, 'bootstrap-backend-') }}
        run: terraform -chdir=terraform/bootstrap/backend plan -input=false -out=backend.tfplan

      - name: Terraform backend apply
        if: ${{ inputs.command == 'bootstrap-backend-apply' }}
        run: terraform -chdir=terraform/bootstrap/backend apply -input=false backend.tfplan

      - name: Verify backend resources
        if: ${{ inputs.command == 'bootstrap-backend-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          STATE_BUCKET="dannawagyu-shaka-prod-terraform-state"
          LOG_BUCKET="dannawagyu-shaka-prod-terraform-state-logs"
          LOCK_TABLE="shaka-prod-terraform-locks"

          aws s3api get-bucket-versioning --bucket "$STATE_BUCKET"
          aws s3api get-bucket-encryption --bucket "$STATE_BUCKET"
          aws s3api get-public-access-block --bucket "$STATE_BUCKET"
          aws s3api get-bucket-logging --bucket "$STATE_BUCKET"
          aws s3api get-bucket-encryption --bucket "$LOG_BUCKET"
          aws s3api get-public-access-block --bucket "$LOG_BUCKET"
          aws dynamodb describe-table \
            --table-name "$LOCK_TABLE" \
            --query 'Table.{TableName:TableName,BillingMode:BillingModeSummary.BillingMode,HashKey:KeySchema[0].AttributeName,SSE:SSEDescription.Status,DeletionProtection:DeletionProtectionEnabled}'
