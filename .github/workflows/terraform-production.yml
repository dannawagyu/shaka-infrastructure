name: Terraform Production

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Terraform command to run"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      apply_confirmation:
        description: "Required for apply: apply-production"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: shaka-production-terraform
  cancel-in-progress: false

jobs:
  terraform-production:
    name: Terraform production ${{ inputs.command }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform/environments/prod
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      TF_VAR_vpc_id: ${{ vars.SHAKA_VPC_ID }}
      TF_VAR_public_subnet_id: ${{ vars.SHAKA_PUBLIC_SUBNET_ID }}
      SHAKA_PRIVATE_SUBNET_IDS_JSON: ${{ vars.SHAKA_PRIVATE_SUBNET_IDS_JSON }}
      TF_VAR_operator_ssh_cidr: ${{ vars.SHAKA_OPERATOR_SSH_CIDR }}
      TF_VAR_ssh_key_name: ${{ vars.SHAKA_SSH_KEY_NAME }}
      TF_VAR_app_ami_id: ${{ vars.SHAKA_APP_AMI_ID }}
      TF_VAR_app_instance_type: ${{ vars.SHAKA_APP_INSTANCE_TYPE || 't3.micro' }}
      TF_VAR_database_name: ${{ vars.SHAKA_DATABASE_NAME || 'shaka' }}
      TF_VAR_db_username: ${{ secrets.SHAKA_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.SHAKA_DB_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate command confirmation
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.command }}" == "apply" && "${{ inputs.apply_confirmation }}" != "apply-production" ]]; then
            echo "Refusing production apply without apply_confirmation=apply-production" >&2
            exit 1
          fi

      - name: Configure AWS credentials from production environment
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.2

      - name: Materialize non-secret production variables
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, pathlib
          required = [
              'TF_VAR_vpc_id',
              'TF_VAR_public_subnet_id',
              'TF_VAR_operator_ssh_cidr',
              'TF_VAR_ssh_key_name',
              'TF_VAR_app_ami_id',
              'TF_VAR_db_username',
              'TF_VAR_db_password',
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit('Missing required production environment values: ' + ', '.join(missing))
          private_subnets = os.environ.get('SHAKA_PRIVATE_SUBNET_IDS_JSON')
          if not private_subnets:
              raise SystemExit('Missing required production environment variable: SHAKA_PRIVATE_SUBNET_IDS_JSON')
          data = {
              'private_subnet_ids': json.loads(private_subnets),
          }
          pathlib.Path('production.auto.tfvars.json').write_text(json.dumps(data, indent=2), encoding='utf-8')
          PY

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=production.tfplan

      - name: Terraform apply
        if: inputs.command == 'apply'
        run: terraform apply -auto-approve production.tfplan
