# Shaka Server - Nginx Reverse Proxy Configuration
# 위치: /etc/nginx/conf.d/shaka-server.conf
# SSL은 certbot --nginx 가 자동으로 추가함

upstream shaka_app {
    server 127.0.0.1:8080;
    keepalive 4;
}

server {
    server_name shaka.dannawagyu.com;

    # Let's Encrypt 인증용
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit
    client_max_body_size 10M;

    # API 프록시
    location / {
        proxy_pass http://shaka_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # Actuator health만 외부 허용 (상세 정보는 차단)
    location /actuator/health {
        proxy_pass http://shaka_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 나머지 Actuator 엔드포인트 외부 차단
    location /actuator/ {
        deny all;
        return 403;
    }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass http://shaka_app;
        proxy_set_header Host $host;
    }

    location /v3/api-docs/ {
        proxy_pass http://shaka_app;
        proxy_set_header Host $host;
    }

    # 로그
    access_log /var/log/nginx/shaka-access.log;
    error_log /var/log/nginx/shaka-error.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/shaka.dannawagyu.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/shaka.dannawagyu.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = shaka.dannawagyu.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name shaka.dannawagyu.com;
    return 404; # managed by Certbot
}
