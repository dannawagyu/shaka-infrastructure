# Shaka Server - Nginx Reverse Proxy Configuration
# Location: /etc/nginx/conf.d/shaka-server.conf
# TLS is terminated upstream at the production ALB (ACM certificate).
# Nginx listens on plain HTTP only; the ALB security group is the only allowed source for port 80.

upstream shaka_app {
    server 127.0.0.1:8080;
    keepalive 4;
}

# Trust X-Forwarded-* only from the default VPC CIDR. Direct requests from outside the VPC
# (still possible until app SG is locked down to alb_sg) will have their forwarded headers ignored.
set_real_ip_from 172.31.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 80;
    server_name shaka.dannawagyu.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit
    client_max_body_size 10M;

    # No scanner-path blocklist. The ALB listener is default-deny (default action returns
    # fixed-response 404, only explicit forward_* rules reach Nginx). Spring/Nginx return
    # natural 404s for anything that gets through.

    # Public health endpoint required by the ALB target group
    location = /actuator/health {
        proxy_pass http://shaka_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Spring metrics scrape stays local-only. Alloy reads /actuator/prometheus on 127.0.0.1.
    location = /actuator/prometheus { deny all; return 403; }
    location /actuator/ { deny all; return 403; }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass http://shaka_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Request-Id $request_id;
    }

    location /v3/api-docs/ {
        proxy_pass http://shaka_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Request-Id $request_id;
    }

    # API proxy
    location / {
        proxy_pass http://shaka_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    access_log /var/log/nginx/shaka-access.log;
    error_log /var/log/nginx/shaka-error.log;
}
